name: crDroid SM8550 Kernel Build Process
permissions:
  contents: write
  actions: write 

on:
  # Оставляем для вызова из других воркфлоу
  workflow_call:
    inputs:
      branch:
        required: true
        type: string
      android_version:
        required: true
        type: string
      kernel_version:
        required: true
        type: string
      susfs:
        required: true
        type: string
      bbg:
        required: true
        type: string
      unicodefix:
        required: true
        type: string
      zeromount:
        required: true
        type: string
      wksu:
        required: true
        type: string
      droidspace:
        required: true
        type: string
      ntsync:
        required: true
        type: string
      optimizations:
        required: true
        type: string
        
  # Добавляем для ручного запуска через кнопку "Run workflow" в GitHub Actions
  workflow_dispatch:
    inputs:
      branch:
        description: 'Ветка (например: 15.0)'
        required: true
        type: string
        default: '15.0'
      android_version:
        description: 'Версия Android'
        required: true
        type: string
        default: '15'
      kernel_version:
        description: 'Версия ядра (например: 5.15)'
        required: true
        type: string
        default: '5.15'
      susfs:
        description: 'Включить SUSFS?'
        required: true
        type: choice
        options: ['true', 'false']
        default: 'true'
      bbg:
        description: 'Включить Baseband-guard?'
        required: true
        type: choice
        options: ['true', 'false']
        default: 'true'
      unicodefix:
        description: 'Включить Unicode fix?'
        required: true
        type: choice
        options: ['true', 'false']
        default: 'true'
      zeromount:
        description: 'Включить Zeromount?'
        required: true
        type: choice
        options: ['true', 'false']
        default: 'true'
      wksu:
        description: 'Включить KernelSU-Next (wksu)?'
        required: true
        type: choice
        options: ['true', 'false']
        default: 'true'
      droidspace:
        description: 'Включить поддержку Droidspace?'
        required: true
        type: choice
        options: ['true', 'false']
        default: 'true'
      ntsync:
        description: 'Включить NTsync?'
        required: true
        type: choice
        options: ['true', 'false']
        default: 'true'
      optimizations:
        description: 'Включить оптимизации?'
        required: true
        type: choice
        options: ['true', 'false']
        default: 'true'

jobs:
  build-crdroid-sm8550:
    name: "${{ inputs.branch }}-${{ inputs.kernel_version }}-${{ inputs.android_version }}"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false

    steps:
      - name: Free Disk Space
        if: true
        uses: endersonmenezes/free-disk-space@v3
        with:
          remove_android: true
          remove_dotnet: true
          remove_haskell: true
          remove_tool_cache: true
          remove_swap: true
          remove_packages: "azure-cli google-cloud-cli microsoft-edge-stable google-chrome-stable firefox postgresql* temurin-* *llvm* mysql* dotnet-sdk-*"
          remove_packages_one_command: true
          remove_folders: "/usr/share/swift /usr/share/miniconda /usr/share/az* /usr/local/lib/node_modules /usr/local/share/chromium /usr/local/share/powershell /usr/local/julia /usr/local/aws-cli /usr/local/aws-sam-cli /usr/share/gradle"
          rm_cmd: "rmz"
          rmz_version: "3.1.1"
          testing: false
      
      - name: Set CONFIG Environment Variable
        run: |
          CONFIG="${{ inputs.branch }}-${{ inputs.android_version }}-${{ inputs.kernel_version }}"
          echo "CONFIG=$CONFIG" >> $GITHUB_ENV

      - name: Clone AnyKernel3 and Dependencies
        run: |
          ANYKERNEL_BRANCH="gki-2.0"
          SUSFS_BRANCH="gki-${{ inputs.android_version }}-${{ inputs.kernel_version }}"
          
          git clone https://github.com/WildKernels/AnyKernel3.git -b "$ANYKERNEL_BRANCH"
          git clone https://github.com/WildKernels/kernel_patches.git
          git clone https://gitlab.com/simonpunk/susfs4ksu.git -b "$SUSFS_BRANCH"
          git clone https://github.com/jimsterino98/Super-Builders.git
      
      - name: Clone crDroid Kernel Source
        run: |
            git clone --depth 1 -b ${{ inputs.branch }} --single-branch https://github.com/crdroidandroid/android_kernel_samsung_sm8550.git $CONFIG
            
      - name: Set Path Environment Variables
        run: |
          ROOT="$GITHUB_WORKSPACE"
          SUSFS4KSU="$ROOT/susfs4ksu"
          KERNEL_PATCHES="$ROOT/kernel_patches"
          ANYKERNEL3="$ROOT/AnyKernel3"
          ZEROMOUNT="$ROOT/Super-Builders"
          
          COMMON="$CONFIG"
          GKI_DEFCONFIG="$COMMON/arch/arm64/configs/gki_defconfig"

          echo "ROOT=$ROOT" >> $GITHUB_ENV
          echo "SUSFS4KSU=$SUSFS4KSU" >> $GITHUB_ENV
          echo "KERNEL_PATCHES=$KERNEL_PATCHES" >> $GITHUB_ENV
          echo "ANYKERNEL3=$ANYKERNEL3" >> $GITHUB_ENV
          echo "COMMON=$COMMON" >> $GITHUB_ENV
          echo "GKI_DEFCONFIG=$GKI_DEFCONFIG" >> $GITHUB_ENV
          echo "ZEROMOUNT=$ZEROMOUNT" >> $GITHUB_ENV

      - name: Add KernelSU-Next
        if: inputs.wksu == 'true'
        run: |
          cd "$COMMON"
          curl -LSs "https://raw.githubusercontent.com/KernelSU-Next/KernelSU-Next/next/kernel/setup.sh" | bash -s stable

          cd "$GITHUB_WORKSPACE"
          cat >> "$GKI_DEFCONFIG" << 'EOF'
          CONFIG_KSU=y
          EOF

      - name: Getting KernelSU-Next Version
        if: inputs.wksu == 'true'
        run: |
          cd "$COMMON/KernelSU-Next/kernel"
          KSU_DIR=$(pwd)
          KBUILD="Kbuild"
          BASE_VERSION=30000

          if [ -d "$KSU_DIR/.git" ]; then
              if [ -f "$KSU_DIR/.git/shallow" ]; then
                  git -C "$KSU_DIR" fetch --unshallow || true
              fi
              KSU_GIT_VERSION=$(git -C "$KSU_DIR" rev-list --count HEAD)
              KSU_VERSION=$((BASE_VERSION + KSU_GIT_VERSION))
              KSU_GIT_TAG=$(git -C "$KSU_DIR" describe --tags --abbrev=0 2>/dev/null || echo "v0.0.1")
          else
              KSU_VERSION=33129
              KSU_GIT_TAG="v3.2.0"
          fi

          echo "KSU_VERSION=$KSU_VERSION" >> $GITHUB_ENV
          echo "KSU_VERSION_TAG=$KSU_GIT_TAG" >> $GITHUB_ENV

          sed -i "s/KSU_VERSION_FALLBACK := [0-9]\+/KSU_VERSION_FALLBACK := ${KSU_VERSION}/" "$KBUILD"
          sed -i "s/KSU_VERSION_TAG_FALLBACK := .*/KSU_VERSION_TAG_FALLBACK := ${KSU_GIT_TAG}/" "$KBUILD"

      - name: Apply SUSFS Patches
        if: inputs.susfs == 'true'
        run: |
          cd "$COMMON/KernelSU-Next"
          cp "$SUSFS4KSU/kernel_patches/KernelSU/10_enable_susfs_for_ksu.patch" .
          patch -p1 < 10_enable_susfs_for_ksu.patch || true
          rm -rf 10_enable_susfs_for_ksu.patch

          cp "$KERNEL_PATCHES/wild/ksun-0daf55582-susfs-v2.1.0-e259e7d6.patch" .
          patch -p1 < ksun-0daf55582-susfs-v2.1.0-e259e7d6.patch || true
          rm -rf ksun-0daf55582-susfs-v2.1.0-e259e7d6.patch
           
          cd ..
          cp "$SUSFS4KSU/kernel_patches/fs/"* ./fs/
          cp "$SUSFS4KSU/kernel_patches/include/linux/"* ./include/linux/
          cp "$SUSFS4KSU/kernel_patches/50_add_susfs_in_gki-${{ inputs.android_version }}-${{ inputs.kernel_version }}.patch" ./          

          sed -i '/#ifdef CONFIG_SECURITY_DEFEX/,/^#endif/d' fs/open.c
          sed -i '/copy_flags = CL_COPY_UNBINDABLE | CL_EXPIRE;/,/#endif/ { /#ifdef CONFIG_KDP_NS/,/#endif/ { /#else/,/#endif/!d; /#else/d; /#endif/d } }' fs/namespace.c
          
          patch -p1 < 50_add_susfs_in_gki-${{ inputs.android_version }}-${{ inputs.kernel_version }}.patch || true
          rm -rf 50_add_susfs_in_gki-${{ inputs.android_version }}-${{ inputs.kernel_version }}.patch
          
          cd "$GITHUB_WORKSPACE"
          cat >> "$GKI_DEFCONFIG" << 'EOF'
          CONFIG_KSU_SUSFS=y
          EOF
          
          if [[ ${{ inputs.zeromount }} == 'true' ]]; then
            cd "$COMMON"
            cp "$ZEROMOUNT/${{ inputs.android_version }}-${{ inputs.kernel_version }}/WildKSU/patches/60_zeromount-${{ inputs.android_version }}-${{ inputs.kernel_version }}.patch" .
            patch -p1 < 60_zeromount-${{ inputs.android_version }}-${{ inputs.kernel_version }}.patch || true
            rm -rf 60_zeromount-${{ inputs.android_version }}-${{ inputs.kernel_version }}.patch

            if [ -f fs/proc/task_mmu.c ]; then
              sed -i '/pgoff = ((loff_t)vma->vm_pgoff) << PAGE_SHIFT;/a\
              #ifdef CONFIG_ZEROMOUNT\
              \tzeromount_spoof_mmap_metadata(inode, \&dev, \&ino);\
              #endif' fs/proc/task_mmu.c
            fi

            cd "$GITHUB_WORKSPACE"
            cat >> "$GKI_DEFCONFIG" << 'EOF'
            CONFIG_ZEROMOUNT=y
            EOF
          fi
          
      - name: Add BBG
        if: inputs.bbg == 'true'
        run: |          
          cd "$COMMON"
          curl -LSs https://github.com/vc-teahouse/Baseband-guard/raw/main/setup.sh | bash
          echo "CONFIG_BBG=y" >> arch/arm64/configs/gki_defconfig
          sed -i '/^config LSM$/,/^help$/{ /^[[:space:]]*default/ { /baseband_guard/! s/selinux/selinux,baseband_guard/ } }' security/Kconfig
          cd "$GITHUB_WORKSPACE"
          sed -i '/^CONFIG_LSM=/ s/"$/,baseband_guard"/' "$GKI_DEFCONFIG"

      - name: Add unicodefix
        if: inputs.unicodefix == 'true'
        run: |  
          cd "$COMMON"
          if [[ ${{ inputs.kernel_version }} == 6.* ]]; then
           cp "$KERNEL_PATCHES/common/unicode_bypass_fix_6.1+.patch" .
           patch -p1 < unicode_bypass_fix_6.1+.patch || true
          else
           cp "$KERNEL_PATCHES/common/unicode_bypass_fix_6.1-.patch" .
           patch -p1 < unicode_bypass_fix_6.1-.patch || true
          fi

      - name: Add droidspace support
        if: inputs.droidspace == 'true'
        run: |  
          cd "$COMMON"
          curl -Ls https://github.com/nullptr-t-oss/android_kernel_common_oneplus_sm8550/commit/769a5cfdc17b98d8e0bd491d45f5651180e42196.patch | patch -p1 --forward || true

          cd "$GITHUB_WORKSPACE"
          cat >> "$GKI_DEFCONFIG" << 'EOF'
          CONFIG_SYSVIPC=y
          CONFIG_POSIX_MQUEUE=y
          CONFIG_IPC_NC=y
          CONFIG_PID_NS=y
          CONFIG_DEVTMPFS=y
          CONFIG_NETFILTER_XT_MATCH_ADDRTYPE=y
          CONFIG_NETFILTER_XT_TARGET_REJECT=y
          CONFIG_NETFILTER_XT_TARGET_LOG=y
          CONFIG_NETFILTER_XT_MATCH_RECENT=y
          CONFIG_IP_SET=y
          CONFIG_IP_SET_HASH_IP=y
          CONFIG_IP_SET_HASH_NET=y
          CONFIG_NETFILTER_XT_SET=y
          EOF
          
      - name: Set Kernel Configuration Variables
        if: inputs.wksu == 'true'
        run: |
          cat >> "$GKI_DEFCONFIG" << 'EOF'
          CONFIG_OVERLAY_FS=y
          CONFIG_TMPFS_XATTR=y
          CONFIG_TMPFS_POSIX_ACL=y
          CONFIG_LOG_BUF_SHIFT=20
          
          CONFIG_UH=n
          CONFIG_UH_RKP=n
          CONFIG_UH_LKMAUTH=n
          CONFIG_UH_LKM_BLOCK=n
          CONFIG_RKP_CFP_JOPP=n
          CONFIG_RKP_CFP=n
          CONFIG_SECURITY_DEFEX=n
          CONFIG_PROCA=n
          CONFIG_FIVE=n
          CONFIG_RKP=n  
          CONFIG_KDP_NS=n
          CONFIG_KDP=n
          EOF

      - name: Add optimizations from kernel patches
        if: inputs.optimizations == 'true'
        run: |
          cd "$COMMON"
          cp "$KERNEL_PATCHES/common/"*.patch ./
          rm -f unicode_bypass_fix_6.1+.patch unicode_bypass_fix_6.1-.patch IPv6_NAT_FIX.patch
          for p in *.patch; do
            if patch -p1 --dry-run < "$p"; then
             patch -p1 < "$p"
            fi
            rm -f "$p"
          done

      - name: Add ntsync
        if: inputs.ntsync == 'true'
        run: |
          cd "$COMMON"
          cp "$KERNEL_PATCHES/common/ntsync/ntsync_base.patch" .
          cp "$KERNEL_PATCHES/common/ntsync/ntsync_compat_${{ inputs.android_version }}-${{ inputs.kernel_version }}.patch" .
          patch -p1 < ntsync_base.patch || true
          patch -p1 < ntsync_compat_${{ inputs.android_version }}-${{ inputs.kernel_version }}.patch || true

          cd "$GITHUB_WORKSPACE"
          cat >> "$GKI_DEFCONFIG" << 'EOF'
          CONFIG_NTSYNC=y
          EOF

      - name: Change Kernel Name
        run: |
          cd "$COMMON"
          if [ -f ./scripts/setlocalversion ]; then
            sed -i '$s|echo "\$res"|echo "\$res-Wild-crDroid"|' ./scripts/setlocalversion
            sed -i 's/-dirty//' ./scripts/setlocalversion
          fi
          
      - name: Set file name
        if: inputs.wksu == 'true'
        run: |
          ARTIFACT_BASE="crDroid-SM8550-${{ inputs.kernel_version }}-${{ inputs.android_version }}"
          FILE_NAME="KSU${KSU_VERSION}-${ARTIFACT_BASE}"
          echo "FILE_NAME=$FILE_NAME" >> $GITHUB_ENV

      - name: Build Kernel
        run : |
          set -e
          set -x
          cd "$CONFIG"
          echo "Building crDroid sm8550 kernel..."
          
          if [ -f "tools/bazel" ]; then
            tools/bazel build --config=fast --lto=thin //common:kernel_aarch64_dist
          else
            echo "Файл tools/bazel не найден. Проверьте систему сборки crDroid (возможно требуется make)."
            exit 1
          fi
          
      - name: Prepare AnyKernel3
        run: |
          cd "$CONFIG"
          if [[ -f ./bazel-bin/common/kernel_aarch64/Image ]]; then
            cp ./bazel-bin/common/kernel_aarch64/Image "$ANYKERNEL3/Image"
          elif [[ -f ./out/dist/Image ]]; then
            cp ./out/dist/Image "$ANYKERNEL3/Image"
          else
            echo "Error: Image file not found! Build might have failed or path is different."
            exit 1
          fi

      - name: Upload AnyKernel3 Artifacts
        uses: actions/upload-artifact@v6
        with:
          name: ${{ env.FILE_NAME }}-AnyKernel3
          path: ./AnyKernel3/**
          compression-level: 9
      
      - name: Scan and collect patch rejects
        if: ${{ always() }}
        run: |
          set -e
          REJECTS_DIR="$GITHUB_WORKSPACE/patch-rejects"
          mkdir -p "$REJECTS_DIR"
          mapfile -t REJS < <(find "$CONFIG" -type f -name '*.rej')
          if [ "${#REJS[@]}" -gt 0 ]; then
            for REJ in "${REJS[@]}"; do
              REL="${REJ#"$CONFIG"/}"
              DEST="$REJECTS_DIR/$REL"
              mkdir -p "$(dirname "$DEST")"
              cp "$REJ" "$DEST"
              echo "$REL" >> "$REJECTS_DIR/index.txt"
            done
          fi

      - name: Generate Build Summary
        if: ${{ always() }}
        run: |
          echo "# Kernel Build Summary: crDroid SM8550" > build_summary.md
          echo "- **Android Version**: ${{ inputs.android_version }}" >> build_summary.md
          echo "- **Kernel Version**: ${{ inputs.kernel_version }}" >> build_summary.md
