name: Build KernelSU-Next + SUSFS (crDroid S23 Plus)

on:
  workflow_dispatch:
    inputs:
      susfs:
        description: 'Enable SUSFS'
        required: true
        default: 'true'
        type: boolean
      bbg:
        description: 'Enable Baseband Guard (BBG)'
        required: true
        default: 'true'
        type: boolean
      bbrv3:
        description: 'Enable BBRv3 TCP (faster internet)'
        required: true
        default: 'true'
        type: boolean
      ntsync:
        description: 'Enable NTSync patches'
        required: true
        default: 'false'
        type: boolean
      optimizations:
        description: 'Apply kernel optimizations'
        required: true
        default: 'true'
        type: boolean
      droidspace:
        description: 'Enable DroidSpace (IPC/Namespace support)'
        required: true
        default: 'false'
        type: boolean
      unicodefix:
        description: 'Apply Unicode bypass fix'
        required: true
        default: 'true'
        type: boolean

env:
  ANDROID_VERSION: android13
  KERNEL_VERSION: "5.15"
  DEFCONFIG: dm2q_defconfig

jobs:
  build-crdroid-s23plus:
    name: "crDroid-S23Plus-KSUNext-${{ github.run_number }}"
    runs-on: ubuntu-latest

    steps:
      # -------------------------------------------------------
      # 0. Free Disk Space
      # -------------------------------------------------------
      - name: 🧹 Free Disk Space
        uses: endersonmenezes/free-disk-space@v3
        with:
          remove_android: true
          remove_dotnet: true
          remove_haskell: true
          remove_tool_cache: true
          remove_swap: true
          remove_packages: "azure-cli google-cloud-cli microsoft-edge-stable google-chrome-stable firefox postgresql* temurin-* *llvm* mysql* dotnet-sdk-*"
          remove_packages_one_command: true
          remove_folders: "/usr/share/swift /usr/share/miniconda /usr/share/az* /usr/local/lib/node_modules /usr/local/share/chromium /usr/local/share/powershell /usr/local/julia /usr/local/aws-cli /usr/local/aws-sam-cli /usr/share/gradle"
          rm_cmd: "rm"
          testing: false

      # -------------------------------------------------------
      # 1. Подготовка среды
      # -------------------------------------------------------
      - name: 📦 Подготовка среды
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential bc curl git python3 \
            libssl-dev libelf-dev unzip \
            clang lld \
            gcc-aarch64-linux-gnu \
            gcc-arm-linux-gnueabi \
            zip

      # -------------------------------------------------------
      # 2. Клонирование репозиториев
      # -------------------------------------------------------
      - name: 📥 Клонирование репозиториев
        run: |
          # Основное ядро crDroid для S23+
          git clone --depth=1 https://github.com/crdroidandroid/android_kernel_samsung_sm8550.git kernel-source

          # AnyKernel3 для упаковки
          git clone https://github.com/osm0sis/AnyKernel3.git AnyKernel3

          # Патчи SUSFS
          git clone https://gitlab.com/simonpunk/susfs4ksu.git -b gki-${{ env.ANDROID_VERSION }}-${{ env.KERNEL_VERSION }}

          # Дополнительные патчи (Wild Kernel patches repo)
          git clone https://github.com/WildKernels/kernel_patches.git

      # -------------------------------------------------------
      # 3. Скачивание компилятора (Neutron Clang)
      # -------------------------------------------------------
      - name: 🛠️ Скачивание компилятора (Neutron Clang)
        run: |
          mkdir clang && cd clang
          curl -LO "https://raw.githubusercontent.com/Neutron-Toolchains/antman/main/antman"
          bash antman -S

      # -------------------------------------------------------
      # 4. Установка KernelSU-Next
      # -------------------------------------------------------
      - name: ⚡ Установка KernelSU-Next
        run: |
          cd kernel-source
          curl -LSs "https://raw.githubusercontent.com/KernelSU-Next/KernelSU-Next/next/kernel/setup.sh" | bash -s dev

      # -------------------------------------------------------
      # 5. Получение версии KernelSU-Next
      # -------------------------------------------------------
      - name: 🔖 Получение версии KernelSU-Next
        run: |
          BASE_VERSION=30000

          if [ -d "kernel-source/KernelSU-Next/.git" ]; then
            if [ -f "kernel-source/KernelSU-Next/.git/shallow" ]; then
              git -C "kernel-source/KernelSU-Next" fetch --unshallow || true
            fi
            KSU_GIT_VERSION=$(git -C "kernel-source/KernelSU-Next" rev-list --count HEAD)
            KSU_VERSION=$((BASE_VERSION + KSU_GIT_VERSION))
            KSU_GIT_TAG=$(git -C "kernel-source/KernelSU-Next" describe --tags --abbrev=0 2>/dev/null || echo "v0.0.1")
          else
            KSU_VERSION=33129
            KSU_GIT_TAG="v3.2.0"
          fi

          echo "KSU_VERSION=$KSU_VERSION" >> $GITHUB_ENV
          echo "KSU_VERSION_TAG=$KSU_GIT_TAG" >> $GITHUB_ENV
          echo "✅ KernelSU-Next версия: $KSU_VERSION ($KSU_GIT_TAG)"

          KBUILD="kernel-source/KernelSU-Next/kernel/Kbuild"
          if [ -f "$KBUILD" ]; then
            sed -i "s/KSU_VERSION_FALLBACK := [0-9]*/KSU_VERSION_FALLBACK := ${KSU_VERSION}/" "$KBUILD"
            sed -i "s/KSU_VERSION_TAG_FALLBACK := .*/KSU_VERSION_TAG_FALLBACK := ${KSU_GIT_TAG}/" "$KBUILD"
          fi

      # -------------------------------------------------------
      # 6. Применение SUSFS
      # -------------------------------------------------------
      - name: 💉 Применение SUSFS
        if: inputs.susfs == true
        run: |
          cd kernel-source

          cp -r ../susfs4ksu/kernel_patches/fs/* ./fs/
          cp -r ../susfs4ksu/kernel_patches/include/linux/* ./include/linux/
          cp ../susfs4ksu/kernel_patches/50_add_susfs_in_gki-${{ env.ANDROID_VERSION }}-${{ env.KERNEL_VERSION }}.patch ./

          # Патч совместимости KSUNext + SUSFS
          if [ -f "../kernel_patches/wild/ksun-0daf55582-susfs-v2.1.0-e259e7d6.patch" ]; then
            cd KernelSU-Next
            cp "../../kernel_patches/wild/ksun-0daf55582-susfs-v2.1.0-e259e7d6.patch" .
            patch -p1 < ksun-0daf55582-susfs-v2.1.0-e259e7d6.patch || true
            rm -f ksun-0daf55582-susfs-v2.1.0-e259e7d6.patch
            cd ..
          fi

          # Подготовка fs/open.c
          sed -i '/#ifdef CONFIG_SECURITY_DEFEX/,/^#endif/d' fs/open.c

          # Основной патч SUSFS
          patch -p1 < 50_add_susfs_in_gki-${{ env.ANDROID_VERSION }}-${{ env.KERNEL_VERSION }}.patch || true
          rm -f 50_add_susfs_in_gki-${{ env.ANDROID_VERSION }}-${{ env.KERNEL_VERSION }}.patch

          # Ручной фикс kernel/sys.c для crDroid
          rm -f kernel/sys.c.rej
          sed -i '/int error = 0;/a \
          #ifdef CONFIG_KSU_SUSFS_SUS_SU\n\tstruct ksu_susfs_sus_su_info sus_su_info;\n#endif' kernel/sys.c
          sed -i '/if (error)/i \
          #ifdef CONFIG_KSU_SUSFS_SUS_SU\n\tif (likely(!error)) {\n\t\terror = ksu_susfs_sus_su(&sus_su_info);\n\t}\n#endif' kernel/sys.c

      # -------------------------------------------------------
      # 7. Добавление BBG
      # -------------------------------------------------------
      - name: 🛡️ Добавление BBG (Baseband Guard)
        if: inputs.bbg == true
        run: |
          cd kernel-source
          curl -LSs https://github.com/vc-teahouse/Baseband-guard/raw/main/setup.sh | bash
          echo "CONFIG_BBG=y" >> arch/arm64/configs/${{ env.DEFCONFIG }}
          sed -i '/^config LSM$/,/^help$/{ /^[[:space:]]*default/ { /baseband_guard/! s/selinux/selinux,baseband_guard/ } }' security/Kconfig
          sed -i '/^CONFIG_LSM=/ s/"$/,baseband_guard"/' arch/arm64/configs/${{ env.DEFCONFIG }} || true

      # -------------------------------------------------------
      # 8. BBRv3 TCP
      # -------------------------------------------------------
      - name: 🌐 Добавление BBRv3 TCP
        if: inputs.bbrv3 == true
        run: |
          cd kernel-source
          PATCH_NAME="bbrv3-${{ env.ANDROID_VERSION }}-${{ env.KERNEL_VERSION }}.patch"

          if [ -f "../kernel_patches/bbr/$PATCH_NAME" ]; then
            echo "✅ Применяем BBRv3 патч: $PATCH_NAME"
            cp "../kernel_patches/bbr/$PATCH_NAME" .
            patch -p1 < "$PATCH_NAME" || true
            rm -f "$PATCH_NAME"
          else
            echo "⚠️ Патч $PATCH_NAME не найден в kernel_patches/bbr/"
            echo "Доступные BBR патчи:"
            find ../kernel_patches/bbr/ -name "*.patch" 2>/dev/null || echo "Папка bbr не найдена"
            echo "Пробуем универсальный BBRv3..."
            # Fallback — пробуем патч от android14-6.1 если нет точного
            FALLBACK="bbrv3-android14-6.1.patch"
            if [ -f "../kernel_patches/bbr/$FALLBACK" ]; then
              cp "../kernel_patches/bbr/$FALLBACK" .
              patch -p1 < "$FALLBACK" || true
              rm -f "$FALLBACK"
            else
              echo "❌ BBRv3 патч не найден совсем, пропускаем"
            fi
          fi

          cat >> "arch/arm64/configs/${{ env.DEFCONFIG }}" << 'EOF'
          # === BBRv3 TCP ===
          CONFIG_TCP_CONG_ADVANCED=y
          CONFIG_TCP_CONG_BBR=y
          CONFIG_TCP_CONG_CUBIC=y
          # CONFIG_DEFAULT_BBR is not set
          CONFIG_DEFAULT_TCP_CONG="cubic"
          CONFIG_NET_SCH_FQ=y
          # CONFIG_TCP_CONG_BIC is not set
          # CONFIG_TCP_CONG_WESTWOOD is not set
          # CONFIG_TCP_CONG_HTCP is not set
          EOF

      # -------------------------------------------------------
      # 9. Unicode bypass fix
      # -------------------------------------------------------
      - name: 🔤 Применение Unicode fix
        if: inputs.unicodefix == true
        run: |
          cd kernel-source
          if [ -f "../kernel_patches/common/unicode_bypass_fix_6.1-.patch" ]; then
            cp "../kernel_patches/common/unicode_bypass_fix_6.1-.patch" .
            patch -p1 < unicode_bypass_fix_6.1-.patch || true
            rm -f unicode_bypass_fix_6.1-.patch
          else
            echo "Патч не найден, пропускаем"
          fi

      # -------------------------------------------------------
      # 10. DroidSpace
      # -------------------------------------------------------
      - name: 🐳 Добавление DroidSpace
        if: inputs.droidspace == true
        run: |
          cd kernel-source
          curl -Ls https://github.com/nullptr-t-oss/android_kernel_common_oneplus_sm8550/commit/769a5cfdc17b98d8e0bd491d45f5651180e42196.patch \
            | patch -p1 --forward || true

      # -------------------------------------------------------
      # 11. Оптимизации
      # -------------------------------------------------------
      - name: ⚡ Применение оптимизаций
        if: inputs.optimizations == true
        run: |
          cd kernel-source
          if ls ../kernel_patches/common/*.patch 1>/dev/null 2>&1; then
            cp ../kernel_patches/common/*.patch ./
            rm -f unicode_bypass_fix_6.1+.patch unicode_bypass_fix_6.1-.patch IPv6_NAT_FIX.patch 2>/dev/null || true
            for p in *.patch; do
              [ -f "$p" ] || continue
              if patch -p1 --dry-run < "$p" >/dev/null 2>&1; then
                echo "✅ Применяем: $p"
                patch -p1 < "$p"
              else
                echo "⚠️ Пропускаем: $p"
              fi
              rm -f "$p"
            done
          fi

      # -------------------------------------------------------
      # 12. NTSync
      # -------------------------------------------------------
      - name: 🔄 Добавление NTSync
        if: inputs.ntsync == true
        run: |
          cd kernel-source
          if [ -f "../kernel_patches/common/ntsync/ntsync_base.patch" ]; then
            cp ../kernel_patches/common/ntsync/ntsync_base.patch .
            cp ../kernel_patches/common/ntsync/ntsync_compat_${{ env.ANDROID_VERSION }}-${{ env.KERNEL_VERSION }}.patch .
            patch -p1 < ntsync_base.patch || true
            patch -p1 < ntsync_compat_${{ env.ANDROID_VERSION }}-${{ env.KERNEL_VERSION }}.patch || true
            rm -f ntsync_base.patch ntsync_compat_*.patch
          else
            echo "NTSync патчи не найдены, пропускаем"
          fi

      # -------------------------------------------------------
      # 13. Уничтожение Polly
      # -------------------------------------------------------
      - name: 🧨 Уничтожение Polly
        run: |
          cd kernel-source
          find . -type f -name "Makefile" -exec sed -i 's/-mllvm -polly[a-zA-Z0-9=_-]*//g' {} +
          find . -type f -name "Makefile" -exec sed -i 's/-mllvm -regalloc-eviction-advisor=[a-z-]*//g' {} +
          find . -type f -name "Makefile" -exec sed -i 's/-mllvm -enable-ml-regalloc//g' {} +
          find . -type f -name "Makefile" -exec sed -i 's/-polly[a-zA-Z0-9=_-]*//g' {} +

      # -------------------------------------------------------
      # 14. Настройка defconfig
      # -------------------------------------------------------
      - name: ⚙️ Настройка defconfig
        run: |
          cd kernel-source
          DEFCFG="arch/arm64/configs/${{ env.DEFCONFIG }}"

          cat >> "$DEFCFG" << 'EOF'
          # === KernelSU-Next ===
          CONFIG_KSU=y

          # === Убийство защиты Samsung ===
          CONFIG_UH=n
          CONFIG_UH_RKP=n
          CONFIG_UH_LKMAUTH=n
          CONFIG_UH_LKM_BLOCK=n
          CONFIG_RKP_CFP_JOPP=n
          CONFIG_RKP_CFP=n
          CONFIG_SECURITY_DEFEX=n
          CONFIG_PROCA=n
          CONFIG_FIVE=n
          CONFIG_RKP=n
          CONFIG_KDP_NS=n
          CONFIG_KDP=n

          # === Базовые фиксы ===
          CONFIG_POLLY_CLANG=n
          CONFIG_TMPFS_XATTR=y
          CONFIG_TMPFS_POSIX_ACL=y
          CONFIG_OVERLAY_FS=y
          CONFIG_LOG_BUF_SHIFT=20
          EOF

          if [ "${{ inputs.susfs }}" = "true" ]; then
            cat >> "$DEFCFG" << 'EOF'
          # === SUSFS ===
          CONFIG_KSU_SUSFS=y
          CONFIG_KSU_SUSFS_SPOOF_UNAME=y
          CONFIG_KSU_SUSFS_ENABLE_LOG=y
          CONFIG_KSU_SUSFS_HIDE_KSU_SUSFS_SYMBOLS=y
          CONFIG_KSU_SUSFS_SUS_SU=y
          EOF
          fi

          if [ "${{ inputs.droidspace }}" = "true" ]; then
            cat >> "$DEFCFG" << 'EOF'
          # === DroidSpace / IPC ===
          CONFIG_SYSVIPC=y
          CONFIG_POSIX_MQUEUE=y
          CONFIG_IPC_NC=y
          CONFIG_PID_NS=y
          CONFIG_DEVTMPFS=y
          CONFIG_NETFILTER_XT_MATCH_ADDRTYPE=y
          CONFIG_NETFILTER_XT_TARGET_REJECT=y
          CONFIG_NETFILTER_XT_TARGET_LOG=y
          CONFIG_IP_SET=y
          CONFIG_IP_SET_HASH_IP=y
          CONFIG_IP_SET_HASH_NET=y
          CONFIG_NETFILTER_XT_SET=y
          EOF
          fi

          if [ "${{ inputs.ntsync }}" = "true" ]; then
            cat >> "$DEFCFG" << 'EOF'
          # === NTSync ===
          CONFIG_NTSYNC=y
          EOF
          fi

      # -------------------------------------------------------
      # 15. Имя ядра и очистка dirty
      # -------------------------------------------------------
      - name: 🏷️ Имя ядра и очистка dirty
        run: |
          cd kernel-source
          sed -i '$s|echo "\$res"|echo "\$res-Wild"|' ./scripts/setlocalversion
          sed -i 's/-dirty//' ./scripts/setlocalversion

      # -------------------------------------------------------
      # 16. Имя артефакта
      # -------------------------------------------------------
      - name: 🏷️ Установка имени артефакта
        run: |
          FILE_NAME="KSU${KSU_VERSION}-crDroid-S23Plus-${{ env.ANDROID_VERSION }}-${{ env.KERNEL_VERSION }}"
          echo "FILE_NAME=$FILE_NAME" >> $GITHUB_ENV
          echo "✅ Имя артефакта: $FILE_NAME"

      # -------------------------------------------------------
      # 17. Компиляция
      # -------------------------------------------------------
      - name: 🏗️ Компиляция ядра
        run: |
          cd kernel-source
          export PATH=$GITHUB_WORKSPACE/clang/bin:$PATH
          export ARCH=arm64
          export SUBARCH=arm64
          export KBUILD_COMPILER_STRING="$(clang --version | head -n 1)"

          make O=out ARCH=arm64 CC=clang LLVM=1 LLVM_IAS=1 ${{ env.DEFCONFIG }}
          make -j$(nproc --all) \
            O=out \
            ARCH=arm64 \
            CC=clang \
            LLVM=1 \
            LLVM_IAS=1 \
            CROSS_COMPILE=aarch64-linux-gnu- \
            CROSS_COMPILE_ARM32=arm-linux-gnueabi- \
            Image

      # -------------------------------------------------------
      # 18. Упаковка AnyKernel3
      # -------------------------------------------------------
      - name: 📦 Упаковка AnyKernel3
        run: |
          IMAGE_PATH="kernel-source/out/arch/arm64/boot/Image"
          if [ -f "$IMAGE_PATH" ]; then
            cp "$IMAGE_PATH" AnyKernel3/Image
          else
            FOUND=$(find kernel-source -name "Image" -not -path "*/src/*" 2>/dev/null | head -1)
            if [ -n "$FOUND" ]; then
              cp "$FOUND" AnyKernel3/Image
            else
              echo "❌ Image не найден!"
              exit 1
            fi
          fi

      # -------------------------------------------------------
      # 19. Загрузка артефактов
      # -------------------------------------------------------
      - name: 🚀 Загрузка AnyKernel3
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.FILE_NAME }}-AnyKernel3
          path: AnyKernel3/**
          compression-level: 9

      - name: 🚀 Загрузка Image
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.FILE_NAME }}-Image
          path: kernel-source/out/arch/arm64/boot/Image

      # -------------------------------------------------------
      # 20. Сбор отклонённых патчей
      # -------------------------------------------------------
      - name: 🔍 Сбор отклонённых патчей
        if: always()
        run: |
          REJECTS_DIR="$GITHUB_WORKSPACE/patch-rejects"
          mkdir -p "$REJECTS_DIR"
          mapfile -t REJS < <(find kernel-source -type f -name '*.rej' 2>/dev/null)
          REJ_COUNT=${#REJS[@]}
          echo "REJ_COUNT=$REJ_COUNT" >> $GITHUB_ENV
          if [ "$REJ_COUNT" -gt 0 ]; then
            for REJ in "${REJS[@]}"; do
              REL="${REJ#kernel-source/}"
              DEST="$REJECTS_DIR/$REL"
              mkdir -p "$(dirname "$DEST")"
              cp "$REJ" "$DEST"
              ORIG="${REJ%.rej}"
              [ -f "$ORIG" ] && cp "$ORIG" "$REJECTS_DIR/${REL%.rej}" || true
              echo "$REL" >> "$REJECTS_DIR/index.txt"
            done
          fi

      - name: 🚀 Загрузка отклонённых патчей
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.FILE_NAME }}-Rejected-Patches
          path: patch-rejects/
          if-no-files-found: ignore

      # -------------------------------------------------------
      # 21. Итоговый отчёт
      # -------------------------------------------------------
      - name: 📋 Итоговый отчёт
        if: always()
        run: |
          echo "# 🔧 Итоги сборки crDroid S23+" >> $GITHUB_STEP_SUMMARY
          echo "| Параметр | Значение |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| **Устройство** | Samsung S23+ (SM-S916B) |" >> $GITHUB_STEP_SUMMARY
          echo "| **Android** | ${{ env.ANDROID_VERSION }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Kernel** | ${{ env.KERNEL_VERSION }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **KernelSU-Next** | v${KSU_VERSION} (${KSU_VERSION_TAG}) |" >> $GITHUB_STEP_SUMMARY
          echo "| **SUSFS** | ${{ inputs.susfs }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **BBG** | ${{ inputs.bbg }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **BBRv3** | ${{ inputs.bbrv3 }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **NTSync** | ${{ inputs.ntsync }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Оптимизации** | ${{ inputs.optimizations }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **DroidSpace** | ${{ inputs.droidspace }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Unicode fix** | ${{ inputs.unicodefix }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -f "kernel-source/out/arch/arm64/boot/Image" ]; then
            echo "## ✅ Сборка успешна" >> $GITHUB_STEP_SUMMARY
          else
            echo "## ❌ Image не найден — сборка упала" >> $GITHUB_STEP_SUMMARY
          fi
          echo "## Отклонённые патчи: ${REJ_COUNT:-0}" >> $GITHUB_STEP_SUMMARY
          if [ -f patch-rejects/index.txt ] && [ -s patch-rejects/index.txt ]; then
            while IFS= read -r line; do
              echo "- \`$line\`" >> $GITHUB_STEP_SUMMARY
            done < patch-rejects/index.txt
          else
            echo "_Отклонённых патчей нет_ ✅" >> $GITHUB_STEP_SUMMARY
          fi
